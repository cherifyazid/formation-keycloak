# =============================================================================
#  Stack LDAP autonome (Keycloak + Postgres + OpenLDAP) :
#
#    docker compose -f docker-compose.ldap.yml up -d
#
#  Services :
#    - keycloak      : http://localhost:8080 (admin / admin)
#    - postgres      : base de Keycloak
#    - openldap      : annuaire LDAP (base dc=example,dc=org)
#    - phpldapadmin  : UI web pour visualiser / éditer l'annuaire
#
#  Les utilisateurs sont injectés au démarrage via keycloak/ldap/bootstrap.ldif
#  Keycloak les fédère grâce au realm "ldap-demo" (realm-ldap-demo.json).
# =============================================================================
services:

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.3
    container_name: keycloak-ldap
    ports:
      - "8080:8080"
      - "8100:8100"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: "admin"
      KC_BOOTSTRAP_ADMIN_PASSWORD: "admin"
      KC_DB: "postgres"
      KC_DB_URL: "jdbc:postgresql://postgres:5432/postgres"
      KC_DB_USERNAME: "postgres"
      KC_DB_PASSWORD: "postgres"
    entrypoint: /bin/sh
    command:
        /opt/keycloak/bin/kc.sh start-dev --import-realm --log-level="INFO"
    volumes:
      - ./keycloak/realms/:/opt/keycloak/data/import/:ro
    depends_on:
      - postgres
      - openldap
    networks:
      - keycloak_network

  postgres:
    image: postgres:17.0
    container_name: postgres-ldap
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: "postgres"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - keycloak_network

  openldap:
    image: osixia/openldap:1.5.0
    container_name: openldap
    command: ["--copy-service", "--loglevel", "info"]
    environment:
      LDAP_ORGANISATION: "Example Corp"
      LDAP_DOMAIN: "example.org"          # => base DN : dc=example,dc=org
      LDAP_BASE_DN: "dc=example,dc=org"
      LDAP_ADMIN_PASSWORD: "admin"        # bind : cn=admin,dc=example,dc=org
      LDAP_CONFIG_PASSWORD: "config"
      LDAP_RFC2307BIS_SCHEMA: "false"
      LDAP_REMOVE_CONFIG_AFTER_SETUP: "true"
      LDAP_TLS: "false"
    ports:
      - "389:389"     # LDAP
      - "636:636"     # LDAPS
    volumes:
      - ldap_data:/var/lib/ldap
      - ldap_config:/etc/ldap/slapd.d
      # LDIF de bootstrap : injecté automatiquement au premier démarrage
      - ./keycloak/ldap/bootstrap.ldif:/container/service/slapd/assets/config/bootstrap/ldif/custom/50-bootstrap.ldif:ro
    networks:
      - keycloak_network

  # UI web LDAP : http://localhost:6443  (login : cn=admin,dc=example,dc=org / admin)
  phpldapadmin:
    image: osixia/phpldapadmin:0.9.0
    container_name: phpldapadmin
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: "openldap"
      PHPLDAPADMIN_HTTPS: "false"
    ports:
      - "6443:80"
    depends_on:
      - openldap
    networks:
      - keycloak_network

  mailpit:
    image: axllent/mailpit:latest
    container_name: kc-mailpit
    restart: unless-stopped
    environment:
      # Stockage en mémoire (les mails sont perdus au redémarrage)
      MP_MAX_MESSAGES: "500"
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # UI web
    networks:
      - keycloak_network

volumes:
  postgres_data:
  ldap_data:
  ldap_config:

networks:
  keycloak_network:
    driver: bridge